services:
  - type: web
    name: sistema-pos-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements/production.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: sistema-pos-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://sistema-pos-frontend.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://sistema-pos-frontend.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.9"

  - type: web
    name: sistema-pos-frontend
    env: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://sistema-pos-backend.onrender.com/api/v1"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: sistema-pos-db
    region: oregon
    plan: free
